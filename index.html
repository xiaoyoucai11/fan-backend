<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智能风扇控制器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#f0f4f8;
  font-family:微软雅黑;
  padding:30px 20px;
}
.box{
  max-width:450px;
  margin:0 auto;
  background:#fff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 4px 20px #00000015;
}
h2{text-align:center;margin-bottom:25px;color:#222;}
.state{
  background:#f6f7f9;
  border-radius:12px;
  padding:20px;
  margin-bottom:25px;
}
.state p{font-size:17px;margin:8px 0;}
.btn-row{margin:20px 0;}
.btn{
  width:100%;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
  margin:6px 0;
  cursor:pointer;
  transition:opacity 0.2s;
}
.btn:hover{opacity:0.9;}
.btn-on{background:#27ae60;color:#fff;}
.btn-off{background:#e74c3c;color:#fff;}
.btn-speed{background:#3498db;color:#fff;}
</style>
</head>
<body>
<div class="box">
  <h2>智能风扇控制</h2>
  <div class="state">
    <p>风扇状态：<span id="powerText">加载中</span></p>
    <p>当前风速：<span id="speedText">加载中</span> 档</p>
  </div>

  <div class="btn-row">
    <button class="btn btn-on" onclick="setPower(true)">开启风扇</button>
    <button class="btn btn-off" onclick="setPower(false)">关闭风扇</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-speed" onclick="setSpeed(1)">低速 1档</button>
    <button class="btn btn-speed" onclick="setSpeed(2)">中速 2档</button>
    <button class="btn btn-speed" onclick="setSpeed(3)">高速 3档</button>
  </div>
</div>

<script>
// 同仓库部署，直接用相对路径，无需修改任何地址！
const API_URL = "";

// 获取风扇状态
async function getState(){
  try {
    let res = await fetch(API_URL + "/api/fan/status");
    let data = await res.json();
    document.getElementById("powerText").innerText = data.power ? "运行中" : "已关闭";
    document.getElementById("speedText").innerText = data.speed;
  } catch (err) {
    document.getElementById("powerText").innerText = "获取失败";
    document.getElementById("speedText").innerText = "获取失败";
  }
}

// 控制风扇开关
async function setPower(boo){
  await fetch(API_URL+"/api/fan/power",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status:boo})
  });
  getState();
}

// 控制风速
async function setSpeed(num){
  await fetch(API_URL+"/api/fan/speed",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({speed:num})
  });
  getState();
}

// 页面加载时获取状态，每2秒自动刷新
getState();
setInterval(getState,2000);
</script>
</body>
</html>
